<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tanam Yuk - Aktivitas Pertanian Interaktif">
    <meta name="theme-color" content="#4CAF50">
    <title>Tanam Yuk! - Agroplay</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        :root {
            --primary-green: #4CAF50;
            --primary-green-dark: #388E3C;
            --primary-green-light: #81C784;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #ffffff 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        /* Top Section - Like Kebun Ajaib */
        .top-section {
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        /* Cloud Shapes - Exact Design */
        .cloud-left {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            height: 35px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50px;
        }
        
        .cloud-left::before {
            content: '';
            position: absolute;
            left: 15px;
            top: -12px;
            width: 30px;
            height: 30px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
        }
        
        .cloud-left::after {
            content: '';
            position: absolute;
            right: 10px;
            top: -8px;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 50%;
        }
        
        .cloud-right {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            height: 35px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50px;
        }
        
        .cloud-right::before {
            content: '';
            position: absolute;
            right: 15px;
            top: -12px;
            width: 30px;
            height: 30px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
        }
        
        .cloud-right::after {
            content: '';
            position: absolute;
            left: 10px;
            top: -8px;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 50%;
        }
        
        /* Header Buttons - Exact Design */
        .back-btn {
            width: 50px;
            height: 50px;
            border-radius: 25px;
            background: var(--primary-green);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }
        
        .title-btn {
            background: var(--primary-green);
            border: none;
            border-radius: 25px;
            padding: 15px 30px;
            color: white;
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        
        .title-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }
        
        .settings-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--primary-green);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        
        .settings-btn:hover {
            transform: scale(1.1) rotate(90deg);
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }
        
        /* Wooden Sign Style */
        .wooden-sign {
            background: linear-gradient(135deg, #8B4513, #A0522D, #6B3410);
            border-radius: 15px;
            padding: 15px 25px;
            color: white;
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            font-size: 18px;
            text-align: center;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            position: relative;
            margin: 10px auto 30px;
            max-width: 200px;
            border: 3px solid #654321;
        }
        
        .wooden-sign::before,
        .wooden-sign::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 20px;
            background: #654321;
            top: -20px;
        }
        
        .wooden-sign::before {
            left: 30px;
        }
        
        .wooden-sign::after {
            right: 30px;
        }
        
        .description-text {
            text-align: center;
            color: #333;
            font-family: 'Fredoka', sans-serif;
            font-size: 16px;
            font-weight: 500;
            margin: 20px auto;
            max-width: 300px;
        }
        
        .title-section {
            text-align: center;
            flex: 1;
            margin: 0 20px;
        }
        
        .page-title {
            background: rgba(255, 255, 255, 0.95);
            color: #4CAF50;
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            font-size: 18px;
            padding: 8px 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            display: inline-block;
            margin: 0 auto;
        }
        
        
        /* Main Content */
        .main-container {
            position: relative;
            z-index: 10;
            padding: 20px;
            padding-bottom: 100px;
        }
        
        /* Instruction Text */
        .instruction-text {
            text-align: center;
            font-family: 'Fredoka', sans-serif;
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin: 30px 0;
        }
        
        /* Activity Cards - Colorful Layout Like Tanaman Pangan */
        .activity-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            max-width: 400px;
            margin: 0 auto;
            padding: 0 10px;
        }
        
        /* Activity Card - Colorful Design Like Tanaman Pangan */
        .activity-card {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            min-height: 200px;
            border: none;
        }
        
        .activity-card:hover {
            transform: translateY(-12px) scale(1.03);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .activity-card:active {
            transform: translateY(-6px) scale(1.01);
            transition: all 0.1s ease;
        }
        
        /* Card Background - Colorful Gradients Like Tanaman Pangan */
        .card-background {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
        }
        
        .activity-card.mengenal-hama .card-background {
            background: linear-gradient(135deg, #FF9800, #FFB74D, #FFCC80);
        }
        
        .activity-card.cara-menanam .card-background {
            background: linear-gradient(135deg, #4CAF50, #66BB6A, #81C784);
        }
        
        /* Card Pattern */
        .card-pattern {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 0.1;
            background-image: 
                radial-gradient(circle at 20% 20%, white 1px, transparent 1px),
                radial-gradient(circle at 80% 80%, white 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        /* Card Content */
        .card-content {
            position: relative;
            z-index: 2;
            padding: 20px;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        /* Menu Logo Wrapper - Like Tanaman Pangan */
        .menu-logo-wrapper {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            backdrop-filter: blur(10px);
            border: 3px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            position: relative;
            transition: all 0.3s ease;
        }
        
        .menu-logo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: all 0.3s ease;
        }
        
        /* Fallback for icons if logo fails to load */
        .menu-icon-wrapper {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: none; /* Hidden by default, shown if logo fails */
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        
        .menu-icon {
            font-size: 28px;
            color: white;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        /* Activity Text - Like Tanaman Pangan */
        .activity-text {
            font-family: 'Fredoka', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: white;
            margin-bottom: 6px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        /* Activity Description - Like Tanaman Pangan */
        .activity-description {
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            line-height: 1.3;
            margin: 0;
        }
        
        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #4CAF50;
            border-radius: 25px 25px 0 0;
            padding: 15px 20px 25px;
            z-index: 20;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.15);
        }
        
        .nav-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 5px 10px;
            border-radius: 10px;
            text-decoration: none;
            background: none;
            border: none;
            font-family: 'Nunito', sans-serif;
        }
        
        .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
        }
        
        .nav-item.active {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .nav-icon {
            font-size: 20px;
            color: white;
        }
        
        .nav-label {
            color: white;
            font-size: 12px;
            font-weight: 600;
        }
        
        /* Responsive Design */
        @media (max-width: 380px) {
            .top-section {
                padding: 15px;
            }
            
            .back-btn, .settings-btn {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }
            
            .title-btn {
                padding: 12px 20px;
                font-size: 16px;
            }
            
            .cloud-left, .cloud-right {
                width: 50px;
                height: 30px;
            }
            
            .cloud-left::before, .cloud-right::before {
                width: 25px;
                height: 25px;
                top: -10px;
            }
            
            .cloud-left::after, .cloud-right::after {
                width: 15px;
                height: 15px;
                top: -6px;
            }
            
            .header-btn {
                width: 35px;
                height: 35px;
                font-size: 14px;
            }
            
            .page-title {
                font-size: 16px;
                padding: 6px 15px;
            }
            
            .activity-cards {
                max-width: 320px;
                gap: 12px;
                padding: 0 5px;
            }
            
            .activity-card {
                min-height: 180px;
            }
            
            .menu-logo-wrapper {
                width: 70px;
                height: 70px;
            }
            
            .menu-icon {
                font-size: 24px;
            }
            
            .activity-text {
                font-size: 16px;
            }
            
            .activity-description {
                font-size: 13px;
            }
        }
        
        @media (min-width: 768px) {
            .top-section {
                padding: 25px;
            }
            
            .cloud-left, .cloud-right {
                width: 70px;
                height: 40px;
            }
            
            .cloud-left::before, .cloud-right::before {
                width: 35px;
                height: 35px;
                top: -14px;
            }
            
            .cloud-left::after, .cloud-right::after {
                width: 25px;
                height: 25px;
                top: -10px;
            }
            
            .header-btn {
                width: 45px;
                height: 45px;
                font-size: 18px;
            }
            
            .page-title {
                font-size: 20px;
                padding: 10px 25px;
            }
            
            .activity-cards {
                max-width: 500px;
                gap: 20px;
                padding: 0 20px;
            }
            
            .activity-card {
                min-height: 220px;
            }
            
            .menu-logo-wrapper {
                width: 90px;
                height: 90px;
            }
            
            .menu-icon {
                font-size: 32px;
            }
            
            .activity-text {
                font-size: 20px;
            }
            
            .activity-description {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Top Section -->
    <div class="top-section">
        <button class="back-btn" onclick="goBack()">
            <i class="fas fa-arrow-left"></i>
        </button>
        
        <div class="title-section">
            <button class="title-btn" onclick="showTitleAnimation()">
                Tanam Yuk!
            </button>
        </div>
        
        <button class="settings-btn" onclick="openSettings()">
            <i class="fas fa-cog"></i>
        </button>
    </div>
    
    <!-- Main Content -->
    <main class="main-container">
        <!-- Wooden Sign -->
        <div class="wooden-sign">
            cara menanam
        </div>
        
        <!-- Description Text -->
        <div class="description-text">
            Ayo Pilih Cara Menanam di Bawah ini
        </div>
        
        <!-- Activity Cards -->
        <div class="activity-cards">
            <!-- Mengenal Hama Card -->
            <div class="activity-card mengenal-hama loading" onclick="goToMengenalHama()">
                <div class="card-background"></div>
                <div class="card-pattern"></div>
                <div class="card-content">
                    <div class="menu-logo-wrapper">
                        <img src="assets/buku-tanamku.png" alt="Mengenal Hama" class="menu-logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                        <div class="menu-icon-wrapper" style="display: none;">
                            <i class="fas fa-bug menu-icon"></i>
                        </div>
                    </div>
                    <h3 class="activity-text">Mengenal Hama</h3>
                    <p class="activity-description">Pelajari berbagai jenis hama tanaman</p>
                </div>
            </div>
            
            <!-- Cara Menanam Card -->
            <div class="activity-card cara-menanam loading" onclick="goToCaraMenanam()">
                <div class="card-background"></div>
                <div class="card-pattern"></div>
                <div class="card-content">
                    <div class="menu-logo-wrapper">
                        <img src="assets/buku-tanamku.png" alt="Cara Menanam" class="menu-logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                        <div class="menu-icon-wrapper" style="display: none;">
                            <i class="fas fa-seedling menu-icon"></i>
                        </div>
                    </div>
                    <h3 class="activity-text">Cara Menanam</h3>
                    <p class="activity-description">Teknik bercocok tanam yang benar</p>
                </div>
            </div>
        </div>
    </main>
    
    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="nav-container">
            <a href="index.html" class="nav-item">
                <i class="fas fa-home nav-icon"></i>
                <span class="nav-label">Home</span>
            </a>
            
            <button class="nav-item" onclick="openSearch()">
                <i class="fas fa-search nav-icon"></i>
                <span class="nav-label">Search</span>
            </button>
            
            <button class="nav-item" onclick="openNotifications()">
                <i class="fas fa-bell nav-icon"></i>
                <span class="nav-label">Notification</span>
            </button>
            
            <button class="nav-item" onclick="openProfile()">
                <i class="fas fa-user nav-icon"></i>
                <span class="nav-label">Profile</span>
            </button>
        </div>
    </nav>
    
    <!-- JavaScript -->
    <script>
        // Navigation Functions
        function goBack() {
            window.history.back();
        }
        
        function openSettings() {
            alert('Settings akan segera tersedia!');
        }
        
        function goToMengenalHama() {
            // Navigate to Mengenal Hama page
            window.location.href = 'mengenal-hama.html';
        }
        
        function goToCaraMenanam() {
            // Navigate to Cara Menanam page
            window.location.href = 'cara-menanam.html';
        }
        
        function openSearch() {
            alert('Search akan segera tersedia!');
        }
        
        function openNotifications() {
            alert('Notifications akan segera tersedia!');
        }
        
        function openProfile() {
            alert('Profile akan segera tersedia!');
        }
        
        function showTitleAnimation() {
            const titleBtn = document.querySelector('.title-btn');
            titleBtn.style.transform = 'scale(1.2) rotate(10deg)';
            setTimeout(() => {
                titleBtn.style.transform = 'scale(1) rotate(0deg)';
            }, 300);
        }
        
        // Add some interactive animations
        document.addEventListener('DOMContentLoaded', function() {
            // Animate cards on scroll
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.style.animation = 'slideInUp 0.5s ease forwards';
                    }
                });
            }, {
                threshold: 0.1
            });
            
            // Observe activity cards
            document.querySelectorAll('.activity-card').forEach(card => {
                observer.observe(card);
            });
        });
        
        // Add slide in animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideInUp {
                from {
                    opacity: 0;
                    transform: translateY(30px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
