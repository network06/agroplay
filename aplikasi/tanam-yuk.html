<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tanam Yuk - Aktivitas Pertanian Interaktif">
    <meta name="theme-color" content="#4CAF50">
    <title>Tanam Yuk! - Agroplay</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #ffffff 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        /* Main Header - Enhanced like buku-tanamku */
        .main-header {
            background: linear-gradient(135deg, #4CAF50 0%, #388E3C 50%, #2E7D32 100%);
            padding: 20px;
            border-radius: 0 0 30px 30px;
            box-shadow: 0 10px 40px rgba(76, 175, 80, 0.4);
            position: relative;
            z-index: 100;
        }
        
        .main-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y="50" font-size="30">🌱</text><text x="80" y="30" font-size="20">🌿</text><text x="20" y="80" font-size="25">🍃</text></svg>');
            opacity: 0.1;
            border-radius: 0 0 30px 30px;
        }
        
        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }
        
        .header-title-section {
            text-align: center;
            flex: 1;
        }
        
        .header-title {
            font-family: 'Fredoka', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            animation: titlePulse 3s ease-in-out infinite;
        }
        
        @keyframes titlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        
        .header-subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 14px;
            font-family: 'Nunito', sans-serif;
        }
        
        .back-btn, .home-btn, .settings-btn {
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        
        .back-btn:hover, .home-btn:hover, .settings-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.1);
        }
        
        .back-btn:hover {
            transform: scale(1.1) rotate(-10deg);
        }
        
        /* Welcome Banner */
        .welcome-banner {
            background: linear-gradient(135deg, #FFF8E1, #FFECB3);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: relative;
            z-index: 1;
            overflow: hidden;
            margin: 20px;
        }
        
        .welcome-banner::before {
            content: '🌾';
            position: absolute;
            right: -10px;
            bottom: -10px;
            font-size: 80px;
            opacity: 0.1;
            transform: rotate(-15deg);
        }
        
        .welcome-icon {
            font-size: 48px;
            animation: bounce 2s ease infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .welcome-text h3 {
            font-family: 'Fredoka', sans-serif;
            font-size: 18px;
            color: #333;
            margin-bottom: 4px;
        }
        
        .welcome-text p {
            font-size: 13px;
            color: #666;
            font-family: 'Nunito', sans-serif;
        }
        
        /* Main Content */
        .main-container {
            position: relative;
            z-index: 10;
            padding: 20px;
            padding-bottom: 100px;
        }
        
        /* Instruction Text */
        .instruction-text {
            text-align: center;
            font-family: 'Fredoka', sans-serif;
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin: 30px 0;
        }
        
        /* Activity Cards Container - Square Grid Layout */
        .activity-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            max-width: 400px;
            margin: 0 auto;
            padding: 0 10px;
        }
        
        /* Activity Card - Square Design */
        .activity-card {
            background: linear-gradient(135deg, #FF9800, #FFB74D);
            border: 3px solid #FFD700;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(255, 152, 0, 0.3);
            position: relative;
            overflow: hidden;
            aspect-ratio: 1;
            min-height: 160px;
        }
        
        .activity-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 12px 35px rgba(255, 152, 0, 0.4);
        }
        
        .activity-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            transition: all 0.5s ease;
        }
        
        .activity-card:hover::before {
            animation: shimmer 0.5s ease;
        }
        
        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }
        
        /* Activity Text - Square Card Layout */
        .activity-text {
            font-family: 'Fredoka', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            z-index: 2;
            position: relative;
            text-align: center;
            margin-bottom: 15px;
        }
        
        /* Activity Illustration - Square Design */
        .activity-illustration {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
        }
        
        .illustration-placeholder {
            font-size: 40px;
            color: rgba(255, 255, 255, 0.8);
        }
        
        .activity-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }
        
        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #4CAF50;
            border-radius: 25px 25px 0 0;
            padding: 15px 20px 25px;
            z-index: 20;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.15);
        }
        
        .nav-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 5px 10px;
            border-radius: 10px;
            text-decoration: none;
            background: none;
            border: none;
            font-family: 'Nunito', sans-serif;
        }
        
        .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
        }
        
        .nav-item.active {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .nav-icon {
            font-size: 20px;
            color: white;
        }
        
        .nav-label {
            color: white;
            font-size: 12px;
            font-weight: 600;
        }
        
        /* Responsive Design - Square Cards & New Header */
        @media (max-width: 380px) {
            .main-header {
                padding: 15px;
            }
            
            .header-title {
                font-size: 24px;
            }
            
            .header-subtitle {
                font-size: 12px;
            }
            
            .welcome-banner {
                margin: 15px;
                padding: 15px;
            }
            
            .welcome-icon {
                font-size: 36px;
            }
            
            .welcome-text h3 {
                font-size: 16px;
            }
            
            .welcome-text p {
                font-size: 12px;
            }
            
            .activity-cards {
                max-width: 320px;
                gap: 12px;
                padding: 0 5px;
            }
            
            .activity-card {
                padding: 15px;
                min-height: 140px;
            }
            
            .activity-text {
                font-size: 16px;
                margin-bottom: 10px;
            }
            
            .activity-illustration {
                width: 60px;
                height: 60px;
            }
            
            .illustration-placeholder {
                font-size: 30px;
            }
        }
        
        @media (min-width: 768px) {
            .main-header {
                padding: 25px;
            }
            
            .header-title {
                font-size: 32px;
            }
            
            .welcome-banner {
                margin: 25px;
                padding: 25px;
            }
            
            .welcome-icon {
                font-size: 56px;
            }
            
            .welcome-text h3 {
                font-size: 20px;
            }
            
            .welcome-text p {
                font-size: 14px;
            }
            
            .activity-cards {
                max-width: 500px;
                gap: 20px;
                padding: 0 20px;
            }
            
            .activity-card {
                padding: 25px;
                min-height: 200px;
            }
            
            .activity-text {
                font-size: 20px;
                margin-bottom: 20px;
            }
            
            .activity-illustration {
                width: 100px;
                height: 100px;
            }
            
            .illustration-placeholder {
                font-size: 50px;
            }
        }
    </style>
</head>
<body>
    <!-- Enhanced Header with Modern Navbar -->
    <header class="main-header">
        <!-- Top Navigation Bar -->
        <div class="header-top">
            <button class="back-btn" onclick="goBack()">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="header-title-section">
                <h1 class="header-title">🌱 Tanam Yuk!</h1>
                <p class="header-subtitle">Aktivitas Pertanian Interaktif</p>
            </div>
            <div class="flex gap-3">
                <button class="home-btn" onclick="goHome()">
                    <i class="fas fa-home"></i>
                </button>
                <button class="settings-btn" onclick="openSettings()">
                    <i class="fas fa-cog"></i>
                </button>
            </div>
        </div>
        
        <!-- Enhanced Welcome Banner -->
        <div class="welcome-banner">
            <div class="welcome-icon">🌾</div>
            <div class="welcome-text">
                <h3>Selamat Datang! 👋</h3>
                <p>Ayo pilih aktivitas pertanian seru di bawah ini!</p>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="main-container">
        <!-- Activity Cards -->
        <div class="activity-cards">
            <!-- Mengenal Hama Card (replacing Pilih Tanaman) -->
            <div class="activity-card" onclick="goToMengenalHama()">
                <div class="activity-text">Mengenal Hama</div>
                <div class="activity-illustration">
                    <img src="assets/mengenal-hama.png" alt="Mengenal Hama" class="activity-image" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div class="illustration-placeholder" style="display: none;">
                        <i class="fas fa-bug"></i>
                    </div>
                </div>
            </div>
            
            <!-- Cara Menanam Card -->
            <div class="activity-card" onclick="goToCaraMenanam()">
                <div class="activity-text">Cara Menanam</div>
                <div class="activity-illustration">
                    <img src="assets/cara-menanam.png" alt="Cara Menanam" class="activity-image" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div class="illustration-placeholder" style="display: none;">
                        <i class="fas fa-seedling"></i>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="nav-container">
            <a href="index.html" class="nav-item">
                <i class="fas fa-home nav-icon"></i>
                <span class="nav-label">Home</span>
            </a>
            
            <button class="nav-item" onclick="openSearch()">
                <i class="fas fa-search nav-icon"></i>
                <span class="nav-label">Search</span>
            </button>
            
            <button class="nav-item" onclick="openNotifications()">
                <i class="fas fa-bell nav-icon"></i>
                <span class="nav-label">Notification</span>
            </button>
            
            <button class="nav-item" onclick="openProfile()">
                <i class="fas fa-user nav-icon"></i>
                <span class="nav-label">Profile</span>
            </button>
        </div>
    </nav>
    
    <!-- JavaScript -->
    <script>
        // Navigation Functions
        function goBack() {
            window.history.back();
        }
        
        function goHome() {
            window.location.href = 'index.html';
        }
        
        function openSettings() {
            alert('Settings akan segera tersedia!');
        }
        
        function goToMengenalHama() {
            // Navigate to Mengenal Hama page
            window.location.href = 'mengenal-hama.html';
        }
        
        function goToCaraMenanam() {
            // Navigate to Cara Menanam page
            window.location.href = 'cara-menanam.html';
        }
        
        function openSearch() {
            alert('Search akan segera tersedia!');
        }
        
        function openNotifications() {
            alert('Notifications akan segera tersedia!');
        }
        
        function openProfile() {
            alert('Profile akan segera tersedia!');
        }
        
        // Add some interactive animations
        document.addEventListener('DOMContentLoaded', function() {
            // Animate cards on scroll
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.style.animation = 'slideInUp 0.5s ease forwards';
                    }
                });
            }, {
                threshold: 0.1
            });
            
            // Observe activity cards
            document.querySelectorAll('.activity-card').forEach(card => {
                observer.observe(card);
            });
        });
        
        // Add slide in animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideInUp {
                from {
                    opacity: 0;
                    transform: translateY(30px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
