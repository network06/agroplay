<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pak Padi - Tanaman Pangan Agroplay">
    <meta name="theme-color" content="#4CAF50">
    <title>Pak Padi - Agroplay</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-green: #4CAF50;
            --primary-green-dark: #388E3C;
            --primary-green-light: #81C784;
            --sky-blue: #87CEEB;
            --cloud-white: #FFFFFF;
            --wood-brown: #8B4513;
            --wood-dark: #654321;
        }
        
        /* Background */
        body {
            background: linear-gradient(180deg, #87CEEB 0%, #E0F7FA 50%, #C8E6C9 100%);
            min-height: 100vh;
            font-family: 'Fredoka', sans-serif;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            position: relative;
        }
        
        /* Cloud Background */
        .clouds {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 200px;
            z-index: 0;
        }
        
        .cloud {
            position: absolute;
            background: white;
            border-radius: 100px;
            opacity: 0.8;
        }
        
        .cloud::before,
        .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 100px;
        }
        
        .cloud1 {
            width: 100px;
            height: 40px;
            top: 20px;
            left: 20px;
            animation: float 20s infinite ease-in-out;
        }
        
        .cloud1::before {
            width: 50px;
            height: 50px;
            top: -25px;
            left: 10px;
        }
        
        .cloud1::after {
            width: 60px;
            height: 40px;
            top: -15px;
            right: 10px;
        }
        
        .cloud2 {
            width: 80px;
            height: 35px;
            top: 60px;
            right: 50px;
            animation: float 25s infinite ease-in-out reverse;
        }
        
        .cloud2::before {
            width: 40px;
            height: 40px;
            top: -20px;
            left: 15px;
        }
        
        .cloud2::after {
            width: 50px;
            height: 35px;
            top: -10px;
            right: 15px;
        }
        
        @keyframes float {
            0%, 100% { transform: translateX(0) translateY(0); }
            25% { transform: translateX(20px) translateY(-10px); }
            50% { transform: translateX(-10px) translateY(5px); }
            75% { transform: translateX(15px) translateY(-5px); }
        }
        
        /* Main Container */
        .main-container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
            padding-bottom: 100px;
        }
        
        /* Header Navigation */
        .header-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            margin-bottom: 30px;
            position: relative;
        }
        
        .nav-left {
            flex: 1;
            display: flex;
            justify-content: flex-start;
            align-items: center;
        }
        
        .nav-center {
            flex: 2;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .nav-right {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }
        
        .nav-button {
            width: 50px;
            height: 50px;
            border-radius: 25px;
            background: var(--primary-green);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            text-decoration: none;
        }
        
        .nav-right .nav-button {
            margin-left: auto;
        }
        
        .nav-button:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }
        
        .kebun-ajaib-sign {
            background: var(--primary-green);
            border-radius: 25px;
            padding: 12px 25px;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        
        .kebun-ajaib-text {
            color: white;
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            font-size: 18px;
        }
        
        /* Wooden Sign Style */
        .wooden-sign {
            background: linear-gradient(135deg, #8B4513, #A0522D, #6B3410);
            border-radius: 15px;
            padding: 15px 25px;
            color: white;
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            font-size: 20px;
            text-align: center;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            position: relative;
            margin: 0 auto 40px;
            max-width: 350px;
            border: 3px solid #654321;
        }
        
        .wooden-sign::before,
        .wooden-sign::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 20px;
            background: #654321;
            top: -20px;
        }
        
        .wooden-sign::before {
            left: 30px;
        }
        
        .wooden-sign::after {
            right: 30px;
        }
        
        /* Content Container */
        .content-container {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }
        
        /* Section Container */
        .section {
            margin-bottom: 40px;
            scroll-margin-top: 20px;
        }
        
        /* Image Frame Container */
        .image-frame-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        
        /* Padi Images Container */
        .padi-images-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            margin: 20px 0;
        }
        
        .padi-image {
            width: 100%;
            max-width: 600px;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
            object-fit: contain;
            background: white;
            padding: 10px;
            border: 3px solid #4CAF50;
        }
        
        .padi-image:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.2);
        }
        
        /* Image Frame - Square Responsive */
        .image-frame {
            background: white;
            border-radius: 20px;
            padding: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            margin: 20px auto 30px;
            max-width: 350px;
            width: 100%;
            aspect-ratio: 1/1;
            border: 6px solid #8B4513;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .image-frame::before {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            background: linear-gradient(45deg, #654321, #8B4513, #A0522D);
            border-radius: 23px;
            z-index: -1;
        }
        
        .frame-image {
            width: 100%;
            height: 100%;
            border-radius: 10px;
            display: block;
            object-fit: cover;
            object-position: center;
        }
        
        /* Introduction Box */
        .intro-box {
            background: linear-gradient(135deg, #E8F5E9, #F1F8E9, #E8F5E9);
            border: 3px solid var(--primary-green);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.2);
            position: relative;
            text-align: center;
        }
        
        .intro-text {
            font-family: 'Fredoka', sans-serif;
            font-size: 18px;
            font-weight: 600;
            color: #2E7D32;
            margin: 0;
            line-height: 1.4;
        }
        
        .intro-text span {
            color: #1B5E20;
            font-weight: 700;
        }
        
        /* Content Box */
        .content-box {
            background: white;
            border: 4px solid #4CAF50;
            border-radius: 20px;
            padding: 25px;
            margin: 20px 0;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            position: relative;
        }
        
        .content-box::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #4CAF50, #81C784, #4CAF50);
            border-radius: 22px;
            z-index: -1;
        }
        
        .content-title {
            font-family: 'Fredoka', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: #2E7D32;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .content-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .content-list li {
            font-family: 'Nunito', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            padding-left: 35px;
            position: relative;
            line-height: 1.5;
        }
        
        .content-list li::before {
            content: attr(data-number);
            position: absolute;
            left: 0;
            top: 0;
            background: #4CAF50;
            color: white;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
        }
        
        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--primary-green);
            padding: 8px 0;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.2);
            z-index: 1000;
        }
        
        .nav-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            max-width: 800px;
            margin: 0 auto;
            padding: 0 10px;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            padding: 6px 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 10px;
            text-decoration: none;
            color: white;
            min-width: 0;
            flex: 1;
            max-width: 100px;
        }
        
        .nav-item:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);
        }
        
        .nav-item.active {
            background: rgba(255,255,255,0.2);
        }
        
        .nav-icon {
            font-size: 18px;
            color: white;
        }
        
        .nav-label {
            font-size: 10px;
            font-weight: 500;
            color: white;
            font-family: 'Nunito', sans-serif;
            text-align: center;
            line-height: 1.2;
            word-wrap: break-word;
        }
        
        /* Loading Animation */
        .loading {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease forwards;
        }
        
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Responsive Design */
        @media (max-width: 480px) {
            .main-container {
                padding: 15px;
                padding-bottom: 100px;
            }
            
            .header-nav {
                padding: 10px 15px;
            }
            
            .nav-button {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }
            
            .nav-right .nav-button {
                margin-left: auto;
            }
            
            .kebun-ajaib-sign {
                padding: 8px 15px;
            }
            
            .kebun-ajaib-text {
                font-size: 14px;
            }
            
            .wooden-sign {
                font-size: 16px;
                padding: 12px 20px;
                max-width: 250px;
            }
            
            .image-frame-container {
                margin: 15px 0;
            }
            
            .padi-images-container {
                gap: 15px;
                margin: 15px 0;
            }
            
            .padi-image {
                max-width: 100%;
                padding: 8px;
                border: 2px solid #4CAF50;
                border-radius: 12px;
            }
            
            .image-frame {
                max-width: 280px;
                margin: 15px auto 25px;
                padding: 10px;
                border: 5px solid #8B4513;
                aspect-ratio: 1/1;
            }
            
            .content-box {
                padding: 20px;
                margin: 15px 0;
            }
            
            .intro-box {
                padding: 18px;
                margin: 15px 0;
            }
            
            .intro-text {
                font-size: 16px;
            }
            
            .content-title {
                font-size: 20px;
            }
            
            .content-list li {
                font-size: 14px;
                margin-bottom: 12px;
                padding-left: 30px;
            }
            
            .content-list li::before {
                width: 22px;
                height: 22px;
                font-size: 12px;
            }
            
            .back-btn, .settings-btn {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }
            
            .nav-item {
                padding: 4px 6px;
            }
            
            .nav-icon {
                font-size: 16px;
            }
            
            .nav-label {
                font-size: 9px;
            }
        }
        
        @media (min-width: 481px) and (max-width: 768px) {
            .header-nav {
                padding: 12px 18px;
            }
            
            .nav-button {
                width: 45px;
                height: 45px;
                font-size: 18px;
            }
            
            .nav-right .nav-button {
                margin-left: auto;
            }
            
            .kebun-ajaib-sign {
                padding: 10px 20px;
            }
            
            .kebun-ajaib-text {
                font-size: 16px;
            }
            
            .wooden-sign {
                font-size: 18px;
                max-width: 300px;
            }
            
            .image-frame-container {
                margin: 18px 0;
            }
            
            .padi-images-container {
                gap: 18px;
                margin: 18px 0;
            }
            
            .padi-image {
                max-width: 500px;
                padding: 9px;
                border: 2.5px solid #4CAF50;
                border-radius: 13px;
            }
            
            .image-frame {
                max-width: 320px;
                padding: 11px;
                border: 5.5px solid #8B4513;
                aspect-ratio: 1/1;
            }
            
            .content-box {
                padding: 22px;
            }
            
            .intro-box {
                padding: 21px;
            }
            
            .intro-text {
                font-size: 17px;
            }
            
            .content-title {
                font-size: 21px;
            }
            
            .content-list li {
                font-size: 15px;
            }
            
            .nav-item {
                padding: 5px 8px;
            }
            
            .nav-icon {
                font-size: 17px;
            }
            
            .nav-label {
                font-size: 9.5px;
            }
        }
        
        @media (min-width: 769px) {
            .header-nav {
                padding: 15px 20px;
            }
            
            .nav-button {
                width: 50px;
                height: 50px;
                font-size: 20px;
            }
            
            .nav-right .nav-button {
                margin-left: auto;
            }
            
            .kebun-ajaib-sign {
                padding: 12px 25px;
            }
            
            .kebun-ajaib-text {
                font-size: 18px;
            }
            
            .wooden-sign {
                font-size: 20px;
                max-width: 350px;
            }
            
            .image-frame-container {
                margin: 20px 0;
            }
            
            .padi-images-container {
                gap: 20px;
                margin: 20px 0;
            }
            
            .padi-image {
                max-width: 600px;
                padding: 10px;
                border: 3px solid #4CAF50;
                border-radius: 15px;
            }
            
            .image-frame {
                max-width: 380px;
                padding: 13px;
                border: 7px solid #8B4513;
                aspect-ratio: 1/1;
            }
            
            .content-box {
                padding: 28px;
            }
            
            .intro-box {
                padding: 25px;
            }
            
            .intro-text {
                font-size: 19px;
            }
            
            .content-title {
                font-size: 24px;
            }
            
            .content-list li {
                font-size: 17px;
            }
            
            .nav-item {
                padding: 7px 10px;
            }
            
            .nav-icon {
                font-size: 19px;
            }
            
            .nav-label {
                font-size: 10.5px;
            }
        }
    </style>
</head>
<body>
    <!-- Cloud Background -->
    <div class="clouds">
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
    </div>
    
    <!-- Main Container -->
    <div class="main-container">
        <!-- Header Navigation -->
        <div class="header-nav">
            <div class="nav-left">
                <a href="#" class="nav-button" onclick="goBack()">
                    <i class="fas fa-arrow-left"></i>
                </a>
            </div>
            <div class="nav-center">
                <div class="kebun-ajaib-sign">
                    <span class="kebun-ajaib-text">Kebun Ajaib</span>
                </div>
            </div>
            <div class="nav-right">
                <a href="#" class="nav-button" onclick="openSettings()">
                    <i class="fas fa-cog"></i>
                </a>
            </div>
        </div>
        
        <!-- Content Container -->
        <div class="content-container">
            <!-- Wooden Sign -->
            <div class="wooden-sign loading" style="animation-delay: 0.1s;">
                Pak Padi si Penghasil Nasi
            </div>
            
            <!-- Bingkai Gambar Buku Tanamku -->
            <div class="image-frame-container loading" style="animation-delay: 0.2s;">
                <div class="image-frame">
                    <img src="assets/buku-tanamku.png" alt="Pak Padi" class="frame-image">
                </div>
            </div>
            
            <!-- Gambar Padi Responsif -->
            <div class="padi-images-container loading" style="animation-delay: 0.3s;">
                <img src="assets/padi-satu.png" alt="Padi Satu" class="padi-image">
                <img src="assets/padi-dua.png" alt="Padi Dua" class="padi-image">
                <img src="assets/padi-tiga.png" alt="Padi Tiga" class="padi-image">
            </div>
        </div>
    </div>
    
    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="nav-container">
            <a href="index.html" class="nav-item">
                <i class="fas fa-home nav-icon"></i>
                <span class="nav-label">Home</span>
            </a>
            <a href="tanam-yuk.html" class="nav-item">
                <i class="fas fa-seedling nav-icon"></i>
                <span class="nav-label">Tanam Yuk</span>
            </a>
            <a href="kuis-seru.html" class="nav-item">
                <i class="fas fa-gamepad nav-icon"></i>
                <span class="nav-label">Kuis Seru</span>
            </a>
            <a href="buku-tanamku.html" class="nav-item">
                <i class="fas fa-book nav-icon"></i>
                <span class="nav-label">Buku Tanamku</span>
            </a>
            <a href="cuan-farming.html" class="nav-item">
                <i class="fas fa-coins nav-icon"></i>
                <span class="nav-label">Cuan Farming</span>
            </a>
            <a href="profil-simple.html" class="nav-item">
                <i class="fas fa-user nav-icon"></i>
                <span class="nav-label">Profile</span>
            </a>
        </div>
    </nav>
    
    <!-- JavaScript -->
    <script>
        // Sound effects
        const clickSound = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBSuBzvLZiTYIG2m98OScTgwOUarm7blmFgU7k9n1unEiBC13yO/eizEIHWq+8+OWT');
        
        // Navigation functions
        function goBack() {
            playClickSound();
            window.location.href = 'tanaman-pangan.html';
        }
        
        function openSettings() {
            playClickSound();
            alert('Pengaturan akan segera tersedia!');
        }
        
        function openNotifications() {
            playClickSound();
            alert('Notifikasi akan segera tersedia!');
        }
        
        function openProfile() {
            playClickSound();
            alert('Profil akan segera tersedia!');
        }
        
        function playClickSound() {
            try {
                clickSound.currentTime = 0;
                clickSound.play().catch(e => console.log('Audio play failed:', e));
            } catch(e) {
                console.log('Audio not supported');
            }
        }
        
        // Add interactive effects
        document.addEventListener('DOMContentLoaded', function() {
            // Add parallax effect to clouds
            window.addEventListener('scroll', function() {
                const scrolled = window.pageYOffset;
                const clouds = document.querySelector('.clouds');
                clouds.style.transform = `translateY(${scrolled * 0.5}px)`;
            });
            
            // Add click sound to navigation items
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => {
                item.addEventListener('click', function(e) {
                    playClickSound();
                });
            });
            
            // Add hover effect to content boxes
            const contentBoxes = document.querySelectorAll('.content-box');
            contentBoxes.forEach(box => {
                box.addEventListener('mouseenter', function() {
                    this.style.transform = 'translateY(-5px)';
                    this.style.boxShadow = '0 10px 30px rgba(0, 0, 0, 0.2)';
                });
                
                box.addEventListener('mouseleave', function() {
                    this.style.transform = '';
                    this.style.boxShadow = '';
                });
            });
        });
        
        // Prevent zoom on double tap for mobile
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(event) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
    </script>
</body>
</html>
