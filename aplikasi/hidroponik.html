<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Hidroponik - Cara Menanam Tanpa Tanah">
    <meta name="theme-color" content="#4CAF50">
    <title>Hidroponik - Agroplay</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        :root {
            --primary-green: #4CAF50;
            --primary-green-dark: #388E3C;
            --primary-green-light: #81C784;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #ffffff 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        /* Top Section - Like Kebun Ajaib */
        .top-section {
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        /* Cloud Shapes - Exact Design */
        .cloud-left {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            height: 35px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50px;
        }
        
        .cloud-left::before {
            content: '';
            position: absolute;
            left: 15px;
            top: -12px;
            width: 30px;
            height: 30px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
        }
        
        .cloud-left::after {
            content: '';
            position: absolute;
            right: 10px;
            top: -8px;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 50%;
        }
        
        .cloud-right {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            height: 35px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50px;
        }
        
        .cloud-right::before {
            content: '';
            position: absolute;
            right: 15px;
            top: -12px;
            width: 30px;
            height: 30px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
        }
        
        .cloud-right::after {
            content: '';
            position: absolute;
            left: 10px;
            top: -8px;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 50%;
        }
        
        .back-btn {
            width: 50px;
            height: 50px;
            border-radius: 25px;
            background: var(--primary-green);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            z-index: 10;
        }
        
        .back-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }
        
        .title-btn {
            background: var(--primary-green);
            border: none;
            border-radius: 25px;
            padding: 15px 30px;
            color: white;
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        
        .title-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }
        
        .settings-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--primary-green);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            z-index: 10;
        }
        
        .settings-btn:hover {
            transform: scale(1.1) rotate(90deg);
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }
        
        /* Wooden Sign Style */
        .wooden-sign {
            background: linear-gradient(135deg, #8B4513, #A0522D, #6B3410);
            border-radius: 15px;
            padding: 15px 25px;
            color: white;
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            font-size: 18px;
            text-align: center;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            position: relative;
            margin: 10px auto 30px;
            max-width: 200px;
            border: 3px solid #654321;
        }
        
        .wooden-sign::before,
        .wooden-sign::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 20px;
            background: #654321;
            top: -20px;
        }
        
        .wooden-sign::before {
            left: 30px;
        }
        
        .wooden-sign::after {
            right: 30px;
        }
        
        .description-text {
            text-align: center;
            color: #333;
            font-family: 'Fredoka', sans-serif;
            font-size: 16px;
            font-weight: 500;
            margin: 20px auto;
            max-width: 300px;
        }
        
        .title-section {
            text-align: center;
            flex: 1;
            margin: 0 20px;
        }
        
        .page-title {
            background: rgba(255, 255, 255, 0.95);
            color: #4CAF50;
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            font-size: 18px;
            padding: 8px 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            display: inline-block;
            margin: 0 auto;
        }
        
        /* Main Content */
        .main-container {
            padding: 20px;
            padding-bottom: 80px;
        }
        
        /* Content Section */
        .content-section {
            max-width: 800px;
            margin: 0 auto;
        }
        
        /* Plant Cards Grid */
        .plant-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 30px auto;
            max-width: 600px;
        }
        
        /* Plant Card - Matching Image Design */
        .plant-card {
            background: white;
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 3px solid #4CAF50;
            position: relative;
            overflow: hidden;
        }
        
        .plant-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }
        
        .plant-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(76, 175, 80, 0.1), transparent);
            transform: rotate(45deg);
            transition: all 0.6s ease;
            opacity: 0;
        }
        
        .plant-card:hover::before {
            animation: shine 0.6s ease;
        }
        
        @keyframes shine {
            0% {
                transform: translateX(-100%) translateY(-100%) rotate(45deg);
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: translateX(100%) translateY(100%) rotate(45deg);
                opacity: 0;
            }
        }
        
        /* Plant Image Container */
        .plant-image-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 15px;
            border-radius: 15px;
            overflow: hidden;
            background: linear-gradient(135deg, #E8F5E8, #C8E6C9);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #4CAF50;
        }
        
        .plant-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        
        .plant-card:hover .plant-image {
            transform: scale(1.1);
        }
        
        /* Plant Name */
        .plant-name {
            font-family: 'Fredoka', sans-serif;
            font-size: 18px;
            font-weight: 600;
            color: #2E7D32;
            margin-bottom: 8px;
        }
        
        /* Plant Description */
        .plant-description {
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
            color: #666;
            font-weight: 500;
            line-height: 1.4;
        }
        
        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #4CAF50;
            padding: 10px 0;
            border-radius: 25px 25px 0 0;
            box-shadow: 0 -4px 20px rgba(76, 175, 80, 0.3);
            z-index: 1000;
        }
        
        .nav-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            max-width: 400px;
            margin: 0 auto;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: white;
            padding: 8px;
            border-radius: 12px;
            transition: all 0.3s ease;
            background: transparent;
            border: none;
            cursor: pointer;
            min-width: 60px;
        }
        
        .nav-item:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        
        .nav-icon {
            font-size: 20px;
            margin-bottom: 4px;
        }
        
        .nav-label {
            font-family: 'Nunito', sans-serif;
            font-size: 12px;
            font-weight: 600;
        }
        
        /* Responsive Design */
        @media (max-width: 480px) {
            .top-section {
                padding: 15px;
            }
            
            .back-btn, .settings-btn {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }
            
            .title-btn {
                padding: 12px 20px;
                font-size: 16px;
            }
            
            .cloud-left, .cloud-right {
                width: 50px;
                height: 30px;
            }
            
            .cloud-left::before, .cloud-right::before {
                width: 25px;
                height: 25px;
                top: -10px;
            }
            
            .cloud-left::after, .cloud-right::after {
                width: 15px;
                height: 15px;
                top: -6px;
            }
            
            .page-title {
                font-size: 16px;
                padding: 6px 15px;
            }
            
            .plant-cards {
                grid-template-columns: 1fr;
                gap: 15px;
                max-width: 300px;
            }
            
            .plant-image-container {
                width: 80px;
                height: 80px;
            }
            
            .plant-name {
                font-size: 16px;
            }
            
            .plant-description {
                font-size: 13px;
            }
        }
        
        @media (min-width: 768px) {
            .top-section {
                padding: 25px;
            }
            
            .cloud-left, .cloud-right {
                width: 70px;
                height: 40px;
            }
            
            .cloud-left::before, .cloud-right::before {
                width: 35px;
                height: 35px;
                top: -14px;
            }
            
            .cloud-left::after, .cloud-right::after {
                width: 25px;
                height: 25px;
                top: -10px;
            }
            
            .page-title {
                font-size: 20px;
                padding: 10px 25px;
            }
            
            .plant-cards {
                grid-template-columns: repeat(2, 1fr);
                gap: 25px;
                max-width: 700px;
            }
            
            .plant-image-container {
                width: 120px;
                height: 120px;
            }
            
            .plant-name {
                font-size: 20px;
            }
            
            .plant-description {
                font-size: 15px;
            }
        }
    </style>
</head>

    </main>
    
    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="nav-container">
            <a href="index.html" class="nav-item">
                <i class="fas fa-home nav-icon"></i>
                <span class="nav-label">Home</span>
            </a>
            
            <button class="nav-item" onclick="openSearch()">
                <i class="fas fa-search nav-icon"></i>
                <span class="nav-label">Search</span>
            </button>
            
            <button class="nav-item" onclick="openNotifications()">
                <i class="fas fa-bell nav-icon"></i>
                <span class="nav-label">Notification</span>
            </button>
            
            <button class="nav-item" onclick="openProfile()">
                <i class="fas fa-user nav-icon"></i>
                <span class="nav-label">Profile</span>
            </button>
        </div>
    </nav>
    
    <!-- JavaScript -->
    <script>
        // Navigation Functions
        function goBack() {
            window.history.back();
        }
        
        function openSettings() {
            alert('Settings akan segera tersedia!');
        }
        
        function selectPlant(plant) {
            alert('Detail untuk tanaman ' + plant + ' akan segera tersedia!');
        }
        
        function openSearch() {
            alert('Search akan segera tersedia!');
        }
        
        function openNotifications() {
            alert('Notifications akan segera tersedia!');
        }
        
        function openProfile() {
            alert('Profile akan segera tersedia!');
        }
        
        function showTitleAnimation() {
            const titleBtn = document.querySelector('.title-btn');
            titleBtn.style.transform = 'scale(1.2) rotate(10deg)';
            setTimeout(() => {
                titleBtn.style.transform = 'scale(1) rotate(0deg)';
            }, 300);
        }
        
        // Add loading animations
        document.addEventListener('DOMContentLoaded', function() {
            const cards = document.querySelectorAll('.plant-card');
            cards.forEach((card, index) => {
                setTimeout(() => {
                    card.style.animation = 'slideInUp 0.5s ease forwards';
                }, index * 200);
            });
        });
        
        // Add slide in animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideInUp {
                from {
                    opacity: 0;
                    transform: translateY(30px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
