        /* ==================== FARM PLOTS CSS ==================== */
        .plot-slot {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #8B4513 0%, #A0522D 50%, #CD853F 100%);
            border: 3px solid #654321;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3), 0 4px 6px rgba(0,0,0,0.2);
            min-height: 100px;
        }
        
        .plot-slot:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3), 0 8px 12px rgba(0,0,0,0.3);
            border-color: #8B4513;
        }
        
        .plot-slot.ready {
            animation: plotReady 1.5s ease-in-out infinite;
            border-color: #FFD700;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3), 0 0 20px rgba(255, 215, 0, 0.6);
        }
        
        @keyframes plotReady {
            0%, 100% { 
                transform: scale(1);
                box-shadow: inset 0 2px 4px rgba(0,0,0,0.3), 0 0 20px rgba(255, 215, 0, 0.6);
            }
            50% { 
                transform: scale(1.05);
                box-shadow: inset 0 2px 4px rgba(0,0,0,0.3), 0 0 30px rgba(255, 215, 0, 0.8);
            }
        }
        
        .plot-empty {
            font-size: 2.5rem;
            color: rgba(255, 255, 255, 0.6);
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }
        
        .plot-slot:hover .plot-empty {
            color: rgba(255, 255, 255, 0.9);
            transform: rotate(90deg);
        }
        
        .plot-plant {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        .plot-icon {
            font-size: 2rem;
            margin-bottom: 4px;
            animation: plantGrow 2s ease-in-out infinite;
        }
        
        @keyframes plantGrow {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(5deg); }
        }
        
        .plot-progress {
            font-size: 0.7rem;
            font-weight: bold;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 2px 6px;
            border-radius: 10px;
            position: absolute;
            bottom: 4px;
            right: 4px;
        }
        
        .plot-slot.ready .plot-progress {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            animation: progressPulse 1s ease-in-out infinite;
        }
        
        @keyframes progressPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

    <script src="js/cuan-farming-enhanced.js"></script>
    
    <script>
        // ==================== INNOVATIVE FEATURES ====================
        
        // Advanced Weather System
        const WeatherSystem = {
            current: 'Cerah',
            forecast: [],
            effects: {
                'Cerah': { growthBonus: 1.2, waterDecay: 1.5, pestRisk: 0.8 },
                'Berawan': { growthBonus: 1.0, waterDecay: 1.2, pestRisk: 1.0 },
                'Mendung': { growthBonus: 0.9, waterDecay: 1.0, pestRisk: 1.2 },
                'Hujan': { growthBonus: 1.1, waterDecay: 0.5, pestRisk: 1.5 }
            },
            
            updateWeather() {
                const weathers = ['Cerah', 'Berawan', 'Mendung', 'Hujan'];
                const icons = { 'Cerah': '☀️', 'Berawan': '☁️', 'Mendung': '☁️', 'Hujan': '🌧️' };
                
                if (Math.random() < 0.3) {
                    this.current = weathers[Math.floor(Math.random() * weathers.length)];
                    const effect = this.effects[this.current];
                    
                    // Update UI
                    const weatherName = document.getElementById('weather-name');
                    const weatherIcon = document.getElementById('weather-icon');
                    if (weatherName) weatherName.textContent = this.current;
                    if (weatherIcon) weatherIcon.textContent = icons[this.current];
                    
                    // Apply effects
                    gameState.weatherBonus = effect.growthBonus;
                    
                    // Show notification
                    if (window.showToast) {
                        window.showToast('info', `Cuaca: ${this.current} - ${effect.growthBonus > 1 ? 'Bonus pertumbuhan!' : 'Pertumbuhan normal'}`);
                    }
                }
            }
        };
        
        // Smart Market AI
        const MarketAI = {
            trends: [],
            predictions: [],
            
            analyzeMarket() {
                const trend = 0.8 + Math.random() * 0.4;
                gameState.marketTrend = Math.round(trend * 100) / 100;
                
                const marketTrend = document.getElementById('market-trend');
                if (marketTrend) {
                    const arrow = gameState.marketTrend > 1 ? '📈' : gameState.marketTrend < 1 ? '📉' : '➡️';
                    marketTrend.textContent = `${arrow} ${Math.round(gameState.marketTrend * 100)}%`;
                }
                
                // Generate market tips
                if (Math.random() < 0.4) {
                    const tips = [
                        '💰 Harga tanaman industri sedang naik!',
                        '🥬 Sayuran sedang tinggi permintaan',
                        '🌸 Tanaman hias menguntungkan minggu ini',
                        '💊 Tanaman obat harga stabil'
                    ];
                    if (window.showToast) {
                        window.showToast('success', tips[Math.floor(Math.random() * tips.length)]);
                    }
                }
            }
        };
        
        // Pest & Disease Management
        const PestSystem = {
            active: [],
            
            checkInfestation() {
                sessionState.plots.forEach((plot, index) => {
                    if (plot && Math.random() < 0.1) {
                        const pests = ['Ulat Grayak', 'Kutu Daun', 'Lalat Buah', 'Thrips'];
                        const pest = pests[Math.floor(Math.random() * pests.length)];
                        
                        this.active.push({ plotIndex: index, pest: pest, severity: Math.random() });
                        
                        if (window.showToast) {
                            window.showToast('warning', `⚠️ ${pest} menyerang plot ${index + 1}!`);
                        }
                    }
                });
            },
            
            treat(plotIndex) {
                this.active = this.active.filter(p => p.plotIndex !== plotIndex);
                if (window.showToast) {
                    window.showToast('success', '✅ Hama berhasil diatasi!');
                }
            }
        };
        
        // Smart Farming Assistant
        const FarmingAssistant = {
            tips: [
                '💡 Gunakan pupuk organik untuk hasil maksimal',
                '🌱 Tanam sayuran di musim hujan untuk hasil lebih baik',
                '💰 Simpan keuntungan untuk upgrade lahan',
                '🌾 Padi paling menguntungkan di pasar normal',
                '🍓 Stroberi premium harga tinggi tapi butuh perawatan',
                '⏰ Panen tepat waktu untuk kualitas terbaik',
                '🌿 Rotasi tanaman untuk menjaga kesuburan tanah',
                '💧 Perhatikan level air untuk hasil optimal'
            ],
            
            giveTip() {
                const tip = this.tips[Math.floor(Math.random() * this.tips.length)];
                const tipElement = document.getElementById('daily-tip');
                if (tipElement) {
                    tipElement.textContent = tip;
                }
                if (window.showToast) {
                    window.showToast('info', tip);
                }
            }
        };
        
        // Advanced Statistics
        const Analytics = {
            history: [],
            
            recordHarvest(plantId, profit, yield) {
                this.history.push({
                    plant: plantId,
                    profit: profit,
                    yield: yield,
                    timestamp: Date.now(),
                    marketTrend: gameState.marketTrend,
                    weather: WeatherSystem.current
                });
                
                // Keep only last 50 records
                if (this.history.length > 50) {
                    this.history.shift();
                }
            },
            
            getBestPlant() {
                if (this.history.length === 0) return null;
                
                const profits = {};
                this.history.forEach(record => {
                    if (!profits[record.plant]) {
                        profits[record.plant] = { total: 0, count: 0 };
                    }
                    profits[record.plant].total += record.profit;
                    profits[record.plant].count += 1;
                });
                
                let best = null;
                let maxProfit = 0;
                
                Object.entries(profits).forEach(([plant, data]) => {
                    const avgProfit = data.total / data.count;
                    if (avgProfit > maxProfit) {
                        maxProfit = avgProfit;
                        best = plant;
                    }
                });
                
                return best;
            }
        };
        
        // Social Features
        const SocialFeatures = {
            leaderboard: [],
            
            updateLeaderboard() {
                // Simulate other players
                this.leaderboard = [
                    { name: 'Anda', level: gameState.level, coins: gameState.coins, isPlayer: true },
                    { name: 'Petani Pro', level: Math.min(gameState.level + 3, 50), coins: gameState.coins * 1.5 },
                    { name: 'Tani Master', level: Math.min(gameState.level + 5, 50), coins: gameState.coins * 2 },
                    { name: 'Agro Expert', level: Math.min(gameState.level + 2, 50), coins: gameState.coins * 1.3 },
                    { name: 'Green Thumb', level: Math.max(gameState.level - 2, 1), coins: gameState.coins * 0.8 }
                ];
                
                this.leaderboard.sort((a, b) => b.coins - a.coins);
            },
            
            showLeaderboard() {
                this.updateLeaderboard();
                
                const leaderboardHTML = `
                    <div class="leaderboard-modal">
                        <h3 class="text-xl font-bold mb-4">🏆 Papan Peringkat</h3>
                        <div class="space-y-2">
                            ${this.leaderboard.map((player, index) => `
                                <div class="leaderboard-item ${player.isPlayer ? 'player' : ''}">
                                    <div class="rank">${index + 1}</div>
                                    <div class="player-info">
                                        <div class="name">${player.name}</div>
                                        <div class="stats">Level ${player.level} • ${formatNumber(player.coins)} coins</div>
                                    </div>
                                    ${index === 0 ? '<div class="crown">👑</div>' : ''}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                
                if (window.showModal) {
                    window.showModal('Papan Peringkat', leaderboardHTML);
                }
            }
        };
        
        // Mini Games
        const MiniGames = {
            wheelOfFortune: {
                prizes: [
                    { type: 'coins', value: 5000, icon: '💰' },
                    { type: 'coins', value: 10000, icon: '💰' },
                    { type: 'fertilizer', value: 'premium', icon: '🌿' },
                    { type: 'seed', value: 'strawberry', icon: '🍓' },
                    { type: 'xp', value: 100, icon: '⭐' },
                    { type: 'nothing', value: 0, icon: '😅' }
                ],
                
                spin() {
                    const prize = this.prizes[Math.floor(Math.random() * this.prizes.length)];
                    
                    switch (prize.type) {
                        case 'coins':
                            gameState.coins += prize.value;
                            if (window.showToast) {
                                window.showToast('success', `💰 Menang ${formatNumber(prize.value)} coins!`);
                            }
                            break;
                        case 'fertilizer':
                            if (window.showToast) {
                                window.showToast('success', `🌿 Menang pupuk ${prize.value}!`);
                            }
                            break;
                        case 'seed':
                            if (window.showToast) {
                                window.showToast('success', `🍓 Menang bibit ${prize.value}!`);
                            }
                            break;
                        case 'xp':
                            gameState.xp += prize.value;
                            if (window.showToast) {
                                window.showToast('success', `⭐ Menang ${prize.value} XP!`);
                            }
                            break;
                        default:
                            if (window.showToast) {
                                window.showToast('info', '😅 Coba lagi next time!');
                            }
                    }
                    
                    if (window.updateUI) {
                        window.updateUI();
                    }
                    if (window.saveGameState) {
                        window.saveGameState();
                    }
                }
            }
        };
        
        // ==================== FARM PLOTS FUNCTIONALITY ====================
        
        // ==================== ENHANCED FUNCTIONALITY ====================
        
        // Initialize innovative systems
        function initializeInnovativeFeatures() {
            // Start weather updates every 30 seconds
            setInterval(() => {
                WeatherSystem.updateWeather();
            }, 30000);
            
            // Start market analysis every 45 seconds
            setInterval(() => {
                MarketAI.analyzeMarket();
            }, 45000);
            
            // Check pest infestation every 2 minutes
            setInterval(() => {
                PestSystem.checkInfestation();
            }, 120000);
            
            // Give farming tips every 90 seconds
            setInterval(() => {
                FarmingAssistant.giveTip();
            }, 90000);
            
            // Update leaderboard every minute
            setInterval(() => {
                SocialFeatures.updateLeaderboard();
            }, 60000);
        }
        
        // Utility functions
        function showToast(type, message) {
            const container = document.getElementById('toast-container');
            if (!container) {
                console.error('toast-container not found');
                return false;
                }
                
                const toast = document.createElement('div');
                const bgColor = {
                    success: 'bg-gradient-to-r from-green-500 to-green-600',
                    error: 'bg-gradient-to-r from-red-500 to-red-600',
                    warning: 'bg-gradient-to-r from-orange-500 to-orange-600',
                    info: 'bg-gradient-to-r from-blue-500 to-blue-600'
                }[type] || 'bg-gradient-to-r from-gray-500 to-gray-600';
                
                const icon = {
                    success: '✅',
                    error: '❌',
                    warning: '⚠️',
                    info: 'ℹ️'
                }[type] || 'ℹ️';
                
                toast.className = `toast ${bgColor} text-white px-4 py-3 rounded-xl shadow-lg mb-2.5 flex items-center gap-2 animate-toast-in min-w-[200px] max-w-[300px]`;
                toast.innerHTML = `
                    <span class="text-lg">${icon}</span>
                    <span class="flex-1 text-sm font-medium">${message}</span>
                `;
                
                container.appendChild(toast);
                Debug.log(`Toast shown: ${type} - ${message}`);
                
                // Auto remove after 3 seconds
                setTimeout(() => {
                    safeExecute(() => {
                        toast.style.opacity = '0';
                        toast.style.transform = 'translateY(-20px)';
                        setTimeout(() => toast.remove(), 300);
                        Debug.log('Toast removed automatically');
                    }, null, 'Remove Toast');
                }, 3000);
                
                return true;
            }, null, 'Show Toast');
        }

        function formatNumber(num) {
            return safeExecute(() => {
                if (typeof num !== 'number') {
                    Debug.warn(`Invalid number format: ${num}`);
                    return '0';
                }
                return new Intl.NumberFormat('id-ID').format(num);
            }, () => '0', 'Format Number');
        }

        // ==================== GLOBAL DEBUG & ERROR HANDLING ====================
        
        // Debug utility - Global scope
        window.Debug = {
            log: function(...args) {
                if (window.DEBUG_VERBOSE !== false) {
                    console.log('[DEBUG]', ...args);
                }
            },
            error: function(...args) {
                console.error('[ERROR]', ...args);
            },
            warn: function(...args) {
                console.warn('[WARN]', ...args);
            },
            success: function(...args) {
                console.log('[SUCCESS]', ...args);
            }
        };
        
        // Performance monitoring - Global scope
        window.Performance = {
            timers: {},
            start: function(name) {
                this.timers[name] = performance.now();
            },
            end: function(name) {
                if (this.timers[name]) {
                    const duration = performance.now() - this.timers[name];
                    window.Debug.log(`⏱️ ${name}: ${duration.toFixed(2)}ms`);
                    delete this.timers[name];
                }
            }
        };
        
        // Safe execution wrapper - Global scope
        window.safeExecute = function(fn, fallback = null, name = 'Operation') {
            try {
                window.Performance.start(name);
                const result = fn();
                window.Performance.end(name);
                return result;
            } catch (error) {
                window.Debug.error(`${name} failed:`, error);
                if (fallback && typeof fallback === 'function') {
                    return fallback();
                }
                return false;
            }
        };

        // ==================== GAME INITIALIZATION ====================
        
        // Initialize game
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 Cuan Farming Enhanced - Initializing...');
            
            // Initialize innovative features
            initializeInnovativeFeatures();
            
            // Load game state if exists
            if (window.loadGameState) {
                window.loadGameState();
            }
            
            // Update UI
            if (window.updateUI) {
                window.updateUI();
            }
            
            // Render plots
            if (window.renderPlots) {
                window.renderPlots();
            }
            
            // Start game systems
            if (window.startGrowthSimulation) {
                window.startGrowthSimulation();
            }
            
            // Initial weather and market
            WeatherSystem.updateWeather();
            MarketAI.analyzeMarket();
            
            console.log('✅ Cuan Farming Enhanced - Ready!');
        });

        // ==================== HELPER FUNCTIONS ====================
        
        function getWeatherMultiplier(weather) {
            const multipliers = {
                'Cerah': 1.2,
                'Berawan': 1.0,
                'Mendung': 0.9,
                'Hujan': 1.1
            };
            return multipliers[weather] || 1.0;
        }
        
        function loadGameState() {
            try {
                const saved = localStorage.getItem('cuanFarmingState');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if (window.gameState) {
                        Object.assign(window.gameState, parsed);
                        if (parsed.plantsUnlocked) {
                            window.gameState.plantsUnlocked = new Set(parsed.plantsUnlocked);
                        }
                    }
                    console.log('✅ Game state loaded');
                }
            } catch (error) {
                console.error('❌ Failed to load game state:', error);
            }
        }
        
        function saveGameState() {
            try {
                if (window.gameState) {
                    const toSave = { 
                        ...window.gameState, 
                        plantsUnlocked: Array.from(window.gameState.plantsUnlocked),
                        lastSave: Date.now()
                    };
                    localStorage.setItem('cuanFarmingState', JSON.stringify(toSave));
                    console.log('✅ Game state saved');
                }
            } catch (error) {
                console.error('❌ Failed to save game state:', error);
            }
        }
        
        function updateUI() {
            try {
                // Update header stats
                const coinsDisplay = document.getElementById('coins-display');
                if (coinsDisplay && window.gameState) {
                    coinsDisplay.textContent = formatNumber(window.gameState.coins);
                }
                
                const levelDisplay = document.getElementById('level-display');
                if (levelDisplay && window.gameState) {
                    levelDisplay.textContent = window.gameState.level;
                }
                
                const xpDisplay = document.getElementById('xp-display');
                if (xpDisplay && window.gameState) {
                    const xpNeeded = window.gameState.level * 500;
                    xpDisplay.textContent = `${window.gameState.xp}/${xpNeeded}`;
                }
                
                // Update stats panel

        // Confirm planting
        function confirmPlanting() {
            return safeExecute(() => {
                Performance.start('Confirm Planting');
                
                if (!sessionState.selectedPlant || sessionState.selectedPlotIndex === null) {
                    showToast('error', 'Pilih tanaman dan plot terlebih dahulu!');
                    return false;
                }
                
                const plant = window.PLANTS?.[sessionState.selectedPlant] || PLANTS[sessionState.selectedPlant];
                if (!plant) {
                    Debug.error(`Plant not found: ${sessionState.selectedPlant}`);
                    showToast('error', 'Tanaman tidak ditemukan!');
                    return false;
                }
                
                const fertilizer = document.getElementById('fertilizer-select')?.value || 'organik';
                const method = document.getElementById('method-select')?.value || 'tradisional';
                const waterLevel = parseInt(document.getElementById('water-slider')?.value || 3);
                
                // Calculate cost
                const fertilizerCost = getFertilizerCost(fertilizer);
                const methodCost = getMethodCost(method);
                const totalCost = plant.seedPrice + fertilizerCost + methodCost;
                
                if (gameState.coins < totalCost) {
                    const needed = totalCost - gameState.coins;
                    showToast('error', `Coins tidak cukup! Butuh ${formatNumber(needed)} coins lagi`);
                    Debug.warn(`Insufficient coins: need ${totalCost}, have ${gameState.coins}`);
                    return false;
                }
                
                // Deduct cost
                gameState.coins -= totalCost;
                gameState.totalPlanted++;
                
                // Plant the crop
                sessionState.plots[sessionState.selectedPlotIndex] = {
                    plantId: sessionState.selectedPlant,
                    progress: 0,
                    fertilizer: fertilizer,
                    method: method,
                    waterLevel: waterLevel,
                    plantedAt: Date.now()
                };
                
                // Add XP for planting
                const plantingXP = Math.max(5, Math.floor(totalCost / 1000));
                gameState.xp += plantingXP;
                
                // Update comprehensive scoring system
                if (typeof updateActivityScore === 'function') {
                    const score = Math.floor(totalCost / 100); // Score based on investment
                    updateActivityScore('cuan-farming', score, plantingXP);
                }
                
                // Save and update
                saveGameState();
                updateUI();
                renderPlots();
                closeModal();
                
                // Enhanced success message
                const fertilizerName = fertilizer === 'none' ? 'tanpa pupuk' : fertilizer;
                const methodName = method === 'tradisional' ? 'cara tradisional' : method;
                
                const message = `?? Berhasil menanam ${plant.icon} ${plant.name}!
Metode: ${methodName}
Pupuk: ${fertilizerName}
Biaya: ${formatNumber(totalCost)} coins
XP: +${plantingXP}`;
                
                showToast('success', message);
                Debug.success(`Planted ${plant.name} at plot ${sessionState.selectedPlotIndex}`);

                checkPlantingAchievements();

                return true;

        // Harvest individual plot with detailed calculation
        function harvestPlot(plotIndex) {
            const plot = sessionState.plots[plotIndex];
            if (!plot || plot.progress < 100) return;
            
            const plant = PLANTS[plot.plantId];
            const fertilizer = FERTILIZERS[plot.fertilizer];
            const method = METHODS[plot.method];
            
            // Calculate yield with all factors
            let baseYield = plant.baseYield;
            let finalYield = baseYield * fertilizer.yieldMult * method.yieldMult;
            
            // Water level bonus/penalty
            const waterFactor = plot.waterLevel / 3; // Optimal is 3
            finalYield *= waterFactor;
            
            // Weather bonus
            const weather = document.getElementById('weather-name').textContent;
            const weatherBonus = getWeatherMultiplier(weather);
            finalYield *= weatherBonus;
            
            // Random quality factor (80% - 120%)
            const qualityFactor = 0.8 + Math.random() * 0.4;
            finalYield *= qualityFactor;
            
            finalYield = Math.round(finalYield * 10) / 10;
            
            // Calculate revenue with market trend
            const baseRevenue = finalYield * plant.sellPrice;
            const marketRevenue = Math.round(baseRevenue * gameState.marketTrend);
            
            // Calculate costs
            const totalCost = plant.seedPrice + fertilizer.cost + method.cost;
            const profit = marketRevenue - totalCost;
            
            // Calculate XP based on profit and difficulty
            const xpGain = Math.max(10, Math.floor(profit / 1000) + plant.growDays * 2);
            
            // Update game state
            gameState.coins += marketRevenue;
            gameState.totalHarvested++;
            gameState.totalProfit += profit;
            gameState.xp += xpGain;
            
            // Update comprehensive scoring system
            if (typeof updateActivityScore === 'function') {
                const score = Math.floor(profit / 100); // Score based on profit
                updateActivityScore('cuan-farming', score, xpGain);
            }
            
            // Update market trend (small fluctuation)
            gameState.marketTrend = Math.max(0.5, Math.min(1.5, 
                gameState.marketTrend + (Math.random() - 0.5) * 0.1));
            
            // Clear plot
            sessionState.plots[plotIndex] = null;
            
            // Check level up
            checkLevelUp();
            
            // Save and update
            saveGameState();
            updateUI();
            renderPlots();
            
            // Show detailed harvest message
            const message = `Panen ${plant.name}! 
Hasil: ${finalYield} ${plant.unit}
Pendapatan: +${formatNumber(marketRevenue)} coins
Profit: +${formatNumber(profit)} coins
XP: +${xpGain}`;
            
            showToast('success', message);
        }

        function checkLevelUp() {
            const requiredXP = gameState.level * 500;
            if (gameState.xp >= requiredXP) {
                gameState.level++;

        // Unlock new plants based on level with progression
        function unlockNewPlants() {
            let unlockedCount = 0;
            
            // Define unlock requirements by level
            const unlockRequirements = {
                1: ['padi', 'cabai', 'tomat', 'jagung'], // Starter plants
                2: ['kentang', 'wortel', 'bayam', 'kangkung'], // Easy vegetables
                3: ['sawi', 'terong', 'mentimun', 'labu', 'buncis'], // Medium vegetables
                4: ['kacanghijau', 'kedelai', 'jahe', 'kunyit'], // Advanced plants
                5: ['temulawak', 'laos', 'kencur', 'sereh'], // Medicinal herbs
                6: ['mawar', 'anggrek', 'melati', 'krisan'], // Ornamental flowers
                7: ['anyelir', 'tulip', 'lavender', 'bougenville'], // Premium flowers
                8: ['heliconia', 'kelapasawit', 'karet', 'tebu'], // Industrial crops
                9: ['kapas', 'kopi', 'teh', 'kakao'], // Commercial crops
                10: ['vanila', 'cengkeh', 'pala', 'merica'], // Spices
                11: ['kayumanis', 'cendana'], // Premium wood
                12: ['jati', 'pinus', 'mahoni'] // Timber trees
            };
            
            // Check each level up to current level
            for (let level = 1; level <= gameState.level; level++) {
                const plantsForLevel = unlockRequirements[level] || [];
                
                plantsForLevel.forEach(plantId => {
                    if (!gameState.plantsUnlocked.has(plantId) && PLANTS[plantId]) {
                        gameState.plantsUnlocked.add(plantId);
                        unlockedCount++;
                        showToast('info', `Tanaman baru terbuka: ${PLANTS[plantId].name} ${PLANTS[plantId].icon}`);
                    }
                });
            }
            
            return unlockedCount;
        }

        function getDifficulty(days) {
            if (days <= 3) return 'easy';
            if (days <= 5) return 'medium';
            return 'hard';
        }

        function getDifficultyText(days) {
            if (days <= 3) return 'Mudah';
            if (days <= 5) return 'Sedang';
            return 'Sulit';
        }

        function getFertilizerCost(type) {
            const costs = { none: 0, organik: 10000, premium: 25000, super: 50000 };
            return costs[type] || 0;
        }

        function getMethodCost(type) {
            const costs = { tradisional: 0, hidroponik: 30000, vertikultur: 20000, greenhouse: 50000 };
            return costs[type] || 0;
        }

        function updateWaterLevel(value) {
            document.getElementById('water-value').textContent = value;

        function filterPlants(category) {
            // Update active tab
            document.querySelectorAll('.category-tab').forEach(tab => tab.classList.remove('active'));
            if (event && event.target) {
                event.target.classList.add('active');
            }
            
            // Filter plants based on category
            const plantOptions = document.querySelectorAll('.plant-option');
            plantOptions.forEach(option => {
                const plantId = option.getAttribute('data-plant-id');
                if (plantId && PLANTS[plantId]) {
                    const plant = PLANTS[plantId];
                    const shouldShow = category === 'all' || plant.category === category;
                    option.style.display = shouldShow ? 'block' : 'none';
                }
            });
        }

        // Modal functions
        function showModal(title, content) {
            const modal = document.getElementById('game-modal');
            const modalBody = document.getElementById('modal-body');
            
            if (modal && modalBody) {
                modalBody.innerHTML = content;
                modal.classList.remove('hidden');
                modal.classList.add('flex');
            }
        }

        function closeModal() {
            const modal = document.getElementById('game-modal');
            if (modal) {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }
        }

        // Save/Load game state
        function saveGameState() {
            const toSave = {
                ...gameState,
                plantsUnlocked: Array.from(gameState.plantsUnlocked)
            };
            localStorage.setItem('cuanFarmingState', JSON.stringify(toSave));
        }

        function loadGameState() {
            const saved = localStorage.getItem('cuanFarmingState');
            if (saved) {
                const parsed = JSON.parse(saved);
                gameState = {
                    ...gameState,
                    ...parsed,
                    plantsUnlocked: new Set(parsed.plantsUnlocked || ['padi', 'cabai', 'tomat', 'jagung'])
                };
            }
        }

        // Expose functions globally
        window.openPlantingModal = openPlantingModal;
        window.selectPlant = selectPlant;
        window.confirmPlanting = confirmPlanting;
        window.harvestPlot = harvestPlot;
        window.updateWaterLevel = updateWaterLevel;
        window.filterPlants = filterPlants;
        window.closeModal = closeModal;
        window.showModal = showModal;
    </script>

        function updateWeatherEffects() {
            // Random weather change
            const weathers = ['Cerah', 'Berawan', 'Mendung', 'Hujan'];
            const weatherIcons = {'Cerah': ' ', 'Berawan': ' ', 'Mendung': ' ', 'Hujan': ' '};
            
            // 70% chance to keep current weather, 30% to change
            if (Math.random() < 0.3) {
                const newWeather = weathers[Math.floor(Math.random() * weathers.length)];
                document.getElementById('weather-name').textContent = newWeather;
                document.getElementById('weather-icon').textContent = weatherIcons[newWeather];
            }
            
            const weather = document.getElementById('weather-name').textContent;
            const sky = document.getElementById('sky');
            const rain = document.getElementById('rain-container');
            const sun = document.getElementById('sun');
            const moon = document.getElementById('moon');
            const stars = document.getElementById('stars');
            
            // Reset all
            sky.className = 'sky';
            rain.classList.remove('active');
            sun.style.display = 'block';
            moon.classList.remove('visible');
            stars.classList.remove('visible');
            
            switch(weather) {
                case 'Hujan':
                    sky.classList.add('rainy');
                    rain.classList.add('active');
                    break;
                case 'Badai':
                    sky.classList.add('storm');
                    rain.classList.add('active');
                    break;
                case 'Mendung':
                    sky.classList.add('cloudy');
                    break;
                default:
                    // Sunny - default
                    break;
            }
        }

        // ==================== HARVEST ALL ====================
        
        function harvestAllReady() {
            return safeExecute(() => {
                Performance.start('Harvest All Ready');
                
                let harvestCount = 0;
                let totalRevenue = 0;
                
                sessionState.plots.forEach((plot, index) => {
                    if (plot && plot.progress >= 100) {
                        // Use global variables from cuan-farming-complete.js
                        const plant = window.PLANTS?.[plot.plantId] || PLANTS[plot.plantId];
                        const fertilizer = window.FERTILIZERS?.[plot.fertilizer] || FERTILIZERS[plot.fertilizer];
                        const method = METHODS[plot.method];
                        
                        if (!plant) {
                            Debug.warn(`Plant not found: ${plot.plantId}`);
                            return;
                        }
                        
                        let yield = plant.baseYield * (fertilizer?.yieldMult || 1) * (method?.yieldMult || 1);
                        yield = Math.round(yield * 10) / 10;
                        
                        const revenue = Math.round(yield * plant.sellPrice * (gameState.marketTrend || 1.0));
                        totalRevenue += revenue;
                        
                        // Add to game state
                        gameState.coins += revenue;
                        gameState.totalHarvested++;
                        gameState.totalProfit += revenue - plant.seedPrice;
                        
                        // Clear plot
                        sessionState.plots[index] = null;
                        harvestCount++;
                        
                        Debug.log(`Harvested ${plant.name}: ${yield} units, ${revenue} coins`);
                    }
                });
                
                if (harvestCount > 0) {
                    // Add XP
                    const xp = Math.max(10, Math.floor(totalRevenue / 1000));
                    gameState.xp += xp;
                    
                    // Check level up
                    checkLevelUp();
                    
                    // Save
                    saveGameState();
                    updateUI();
                    renderPlots();
                    
                    showToast('success', `Panen ${harvestCount} tanaman! +${formatNumber(totalRevenue)} coins +${xp} XP`);
                    Debug.success(`Mass harvest completed: ${harvestCount} plants, ${totalRevenue} coins`);
                } else {
                    showToast('info', 'Tidak ada tanaman siap dipanen');
                    Debug.log('No ready plants for harvest');
                }
                
                Performance.end('Harvest All Ready');
                return true;
            }, null, 'Harvest All Ready');
        }

        // Toast notification system with debugging
        function showToast(type, message) {
            return safeExecute(() => {
                const container = document.getElementById('toast-container');
                if (!container) {
                    Debug.error('toast-container element not found');
                    return false;
                }
                
                const toast = document.createElement('div');
                const bgColor = {
                    success: 'bg-gradient-to-r from-green-500 to-green-600',
                    error: 'bg-gradient-to-r from-red-500 to-red-600',
                    warning: 'bg-gradient-to-r from-orange-500 to-orange-600',
                    info: 'bg-gradient-to-r from-blue-500 to-blue-600'
                }[type] || 'bg-gradient-to-r from-gray-500 to-gray-600';
                
                const icon = {
                    success: '✅',
                    error: '❌',
                    warning: '⚠️',
                    info: 'ℹ️'
                }[type] || 'ℹ️';
                
                toast.className = `toast toast-${type} ${bgColor} text-white px-4 py-3 rounded-xl shadow-lg mb-2.5 flex items-center gap-2 animate-toast-in min-w-[200px] max-w-[300px]`;
                toast.innerHTML = `
                    <span class="text-lg">${icon}</span>
                    <span class="flex-1 text-sm font-medium">${message}</span>
                `;
                
                container.appendChild(toast);
                Debug.log(`Toast shown: ${type} - ${message}`);
                
                // Auto remove after 3 seconds
                setTimeout(() => {
                    safeExecute(() => {
                        toast.style.opacity = '0';
                        toast.style.transform = 'translateY(-20px)';
                        setTimeout(() => toast.remove(), 300);
                        Debug.log('Toast removed automatically');
                    }, null, 'Remove Toast');
                }, 3000);
                
                return true;
            }, null, 'Show Toast');
        }
        
        // Format number with debugging
        function formatNumber(num) {
            return safeExecute(() => {
                if (typeof num !== 'number') {
                    Debug.warn(`Invalid number format: ${num}`);
                    return '0';
                }
                return new Intl.NumberFormat('id-ID').format(num);
            }, () => '0', 'Format Number');
        }
